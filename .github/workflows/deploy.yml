# .github/workflows/deploy.yml
name: Deploy
on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.LIGHTSAIL_HOST }}
                  username: ${{ secrets.LIGHTSAIL_USER }}
                  key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                  script: deploy
