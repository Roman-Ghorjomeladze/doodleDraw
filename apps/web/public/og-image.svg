<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- Gradient matching AnimatedLogo: indigo → orange → indigo (V-shape) -->
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="25%" stop-color="#9a6ad4"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="75%" stop-color="#9a6ad4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="60" fill="#6366f1" opacity="0.15"/>
  <circle cx="1100" cy="530" r="80" fill="#6366f1" opacity="0.12"/>
  <circle cx="1050" cy="100" r="40" fill="#f59e0b" opacity="0.1"/>
  <circle cx="150" cy="500" r="50" fill="#34d399" opacity="0.1"/>
  <circle cx="600" cy="50" r="30" fill="#f97316" opacity="0.08"/>
  <circle cx="900" cy="580" r="45" fill="#818cf8" opacity="0.1"/>

  <!-- Pencil icon — centered on top -->
  <g transform="translate(540,60) rotate(-15,60,80) scale(1.8)">
    <!-- Pencil body -->
    <rect x="48" y="20" width="24" height="80" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <!-- Pencil tip -->
    <polygon points="48,100 72,100 60,125" fill="#fcd34d"/>
    <polygon points="55,118 65,118 60,128" fill="#e0e7ff"/>
    <!-- Eraser -->
    <rect x="48" y="20" width="24" height="14" rx="2" fill="#f87171"/>
    <!-- Pencil stripe -->
    <rect x="48" y="55" width="24" height="6" fill="#f59e0b" opacity="0.4"/>
  </g>

  <!-- Title with gradient matching the app -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="96" fill="url(#title-gradient)">DoodleDraw</text>

  <!-- Subtitle -->
  <text x="600" y="445" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="32" fill="#c7d2fe">Draw, guess, and compete with friends!</text>

  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="24" fill="#818cf8" opacity="0.7">doodledraw.games</text>
</svg>
